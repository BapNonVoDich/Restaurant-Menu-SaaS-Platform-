server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/order_db}
    username: ${SPRING_DATASOURCE_USERNAME:restaurant_saas}
    password: ${SPRING_DATASOURCE_PASSWORD:restaurant_saas_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      initialization-fail-timeout: -1
      connection-test-query: SELECT 1
      validate-on-connection: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

jwt:
  secret: ${JWT_SECRET:restaurant-saas-secret-key-change-in-production-minimum-256-bits}

services:
  catalog-url: ${CATALOG_SERVICE_URL:http://localhost:8082}

logging:
  level:
    com.restaurantsaas.order: DEBUG
