server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # Identity Service - v1
        - id: identity-service-v1
          uri: http://${IDENTITY_SERVICE_HOST:localhost}:${IDENTITY_SERVICE_PORT:8081}
          predicates:
            - Path=/api/v1/identity/**
          filters:
            - StripPrefix=3
        # Identity Service - Legacy (backward compatibility)
        - id: identity-service
          uri: http://${IDENTITY_SERVICE_HOST:localhost}:${IDENTITY_SERVICE_PORT:8081}
          predicates:
            - Path=/api/identity/**
          filters:
            - StripPrefix=2

        # Catalog Service - v1
        - id: catalog-service-v1
          uri: http://${CATALOG_SERVICE_HOST:localhost}:${CATALOG_SERVICE_PORT:8082}
          predicates:
            - Path=/api/v1/catalog/**
          filters:
            - StripPrefix=3
        # Catalog Service - Legacy (backward compatibility)
        - id: catalog-service
          uri: http://${CATALOG_SERVICE_HOST:localhost}:${CATALOG_SERVICE_PORT:8082}
          predicates:
            - Path=/api/catalog/**
          filters:
            - StripPrefix=2

        # Order Service - v1
        - id: order-service-v1
          uri: http://${ORDER_SERVICE_HOST:localhost}:${ORDER_SERVICE_PORT:8083}
          predicates:
            - Path=/api/v1/order/**
          filters:
            - StripPrefix=3
        # Order Service - Legacy (backward compatibility)
        - id: order-service
          uri: http://${ORDER_SERVICE_HOST:localhost}:${ORDER_SERVICE_PORT:8083}
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=2

        # Payment Service - v1
        - id: payment-service-v1
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:${PAYMENT_SERVICE_PORT:8084}
          predicates:
            - Path=/api/v1/payment/**
          filters:
            - StripPrefix=3
        # Payment Service - Legacy (backward compatibility)
        - id: payment-service
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:${PAYMENT_SERVICE_PORT:8084}
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=2

      # Rate limiting enabled
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"

  # Redis configuration - only needed if rate limiter is enabled
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
