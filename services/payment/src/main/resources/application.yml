server:
  port: 8084

spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/payment_db}
    username: ${SPRING_DATASOURCE_USERNAME:restaurant_saas}
    password: ${SPRING_DATASOURCE_PASSWORD:restaurant_saas_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      initialization-fail-timeout: -1
      connection-test-query: SELECT 1
      validate-on-connection: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

# VNPay Configuration
vnpay:
  tmn-code: ${VNPAY_TMN_CODE:}
  hash-secret: ${VNPAY_HASH_SECRET:}
  url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  return-url: ${VNPAY_RETURN_URL:http://localhost:3000/payment/return}
  # URL công khai tới payment-service (sandbox: ngrok hoặc host:8084). VNPay POST IPN tới đây.
  ipn-url: ${VNPAY_IPN_URL:http://localhost:8084/vnpay/ipn}
  api-url: ${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}

# Gọi trực tiếp catalog (Docker: http://catalog:8082)
catalog:
  base-url: ${CATALOG_SERVICE_URL:http://localhost:8082}

# Phải trùng với internal.subscription-key trên catalog-service
internal:
  subscription-key: ${INTERNAL_SUBSCRIPTION_KEY:}

jwt:
  secret: ${JWT_SECRET:restaurant-saas-secret-key-change-in-production-minimum-256-bits}

logging:
  level:
    com.restaurantsaas.payment: DEBUG
