server:
  port: 8082

spring:
  application:
    name: catalog-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/catalog_db}
    username: ${SPRING_DATASOURCE_USERNAME:restaurant_saas}
    password: ${SPRING_DATASOURCE_PASSWORD:restaurant_saas_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      initialization-fail-timeout: -1
      connection-test-query: SELECT 1
      validate-on-connection: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

# JWT Configuration (must match Identity service)
jwt:
  secret: ${JWT_SECRET:restaurant-saas-secret-key-change-in-production-minimum-256-bits}

# Cloudinary Configuration (for image uploads)
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

services:
  identity-url: ${IDENTITY_SERVICE_URL:http://localhost:8081}

# Khóa dùng cho payment-service khi PUT /stores/internal/subscription-active/...
internal:
  subscription-key: ${INTERNAL_SUBSCRIPTION_KEY:}

logging:
  level:
    com.restaurantsaas.catalog: DEBUG
