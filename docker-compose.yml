services:
  postgres-identity:
    image: postgres:16
    container_name: postgres-identity
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: restaurant_saas
      POSTGRES_PASSWORD: restaurant_saas_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-identity-data:/var/lib/postgresql/data
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_saas -d identity_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-catalog:
    image: postgres:16
    container_name: postgres-catalog
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: restaurant_saas
      POSTGRES_PASSWORD: restaurant_saas_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres-catalog-data:/var/lib/postgresql/data
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_saas -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-order:
    image: postgres:16
    container_name: postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: restaurant_saas
      POSTGRES_PASSWORD: restaurant_saas_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_saas -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-payment:
    image: postgres:16
    container_name: postgres-payment
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: restaurant_saas
      POSTGRES_PASSWORD: restaurant_saas_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_saas -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - IDENTITY_SERVICE_HOST=identity
      - IDENTITY_SERVICE_PORT=8081
      - CATALOG_SERVICE_HOST=catalog
      - CATALOG_SERVICE_PORT=8082
      - ORDER_SERVICE_HOST=order
      - ORDER_SERVICE_PORT=8083
      - PAYMENT_SERVICE_HOST=payment
      - PAYMENT_SERVICE_PORT=8084
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      redis:
        condition: service_healthy
      identity:
        condition: service_started
      catalog:
        condition: service_started
      order:
        condition: service_started
      payment:
        condition: service_started
    networks:
      - restaurant-network
    restart: unless-stopped

  identity:
    build:
      context: ./services/identity
      dockerfile: Dockerfile
    container_name: identity-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-identity:5432/identity_db
      - SPRING_DATASOURCE_USERNAME=restaurant_saas
      - SPRING_DATASOURCE_PASSWORD=restaurant_saas_pass
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-restaurant-saas-secret-key-change-in-production-minimum-256-bits}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
    depends_on:
      postgres-identity:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - restaurant-network
    restart: unless-stopped

  catalog:
    build:
      context: ./services/catalog
      dockerfile: Dockerfile
    container_name: catalog-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-catalog:5432/catalog_db
      - SPRING_DATASOURCE_USERNAME=restaurant_saas
      - SPRING_DATASOURCE_PASSWORD=restaurant_saas_pass
      - JWT_SECRET=${JWT_SECRET:-restaurant-saas-secret-key-change-in-production-minimum-256-bits}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - IDENTITY_SERVICE_URL=http://identity:8081
      - INTERNAL_SUBSCRIPTION_KEY=${INTERNAL_SUBSCRIPTION_KEY:-dev-internal-subscription-key-change-me}
    depends_on:
      postgres-catalog:
        condition: service_healthy
    networks:
      - restaurant-network
    restart: unless-stopped

  order:
    build:
      context: ./services/order
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-order:5432/order_db
      - SPRING_DATASOURCE_USERNAME=restaurant_saas
      - SPRING_DATASOURCE_PASSWORD=restaurant_saas_pass
      - JWT_SECRET=${JWT_SECRET:-restaurant-saas-secret-key-change-in-production-minimum-256-bits}
      - CATALOG_SERVICE_URL=http://catalog:8082
    depends_on:
      postgres-order:
        condition: service_healthy
    networks:
      - restaurant-network
    restart: unless-stopped

  payment:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-payment:5432/payment_db
      - SPRING_DATASOURCE_USERNAME=restaurant_saas
      - SPRING_DATASOURCE_PASSWORD=restaurant_saas_pass
      - JWT_SECRET=${JWT_SECRET:-restaurant-saas-secret-key-change-in-production-minimum-256-bits}
      - CATALOG_SERVICE_URL=http://catalog:8082
      - INTERNAL_SUBSCRIPTION_KEY=${INTERNAL_SUBSCRIPTION_KEY:-dev-internal-subscription-key-change-me}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL:-http://localhost:3000/payment/return}
      - VNPAY_IPN_URL=${VNPAY_IPN_URL:-http://localhost:8084/vnpay/ipn}
    depends_on:
      postgres-payment:
        condition: service_healthy
    networks:
      - restaurant-network
    restart: unless-stopped

volumes:
  postgres-identity-data:
  postgres-catalog-data:
  postgres-order-data:
  postgres-payment-data:
  redis-data:

networks:
  restaurant-network:
    driver: bridge
